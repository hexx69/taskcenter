name = "taskcenter"
main = "src/worker.ts"
compatibility_date = "2025-02-01"
account_id = "fd39fc50879a94e5f06cf5c9b48549d4"

[assets]
directory = "../ui/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
OPENROUTER_BASE_URL = "https://gateway.ai.cloudflare.com/v1/fd39fc50879a94e5f06cf5c9b48549d4/taskcenter/openrouter/v1"
GATEWAY_BASE_URL = "https://gateway.ai.cloudflare.com/v1/fd39fc50879a94e5f06cf5c9b48549d4/taskcenter/compat"
ADMIN_EMAILS = "hitesh.m@bootminds.com,sanjay@bootminds.com"
# Auth email sender — must be a verified domain in Resend (taskcenter.co).
# Outbound email (magic links, OTP) fails until RESEND_API_KEY is set via
# `wrangler secret put RESEND_API_KEY` and this domain is DNS-verified.
AUTH_EMAIL_FROM = "TaskCenter <noreply@taskcenter.co>"
# Origin the worker uses when building OAuth redirect URIs + magic-link URLs.
# Override in prod via `[env.production] PUBLIC_APP_URL = "https://app.taskcenter.co"`.
PUBLIC_APP_URL = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "taskcenter"
database_id = "5e5b11d8-9dbb-44ae-89f9-b860eafac35b"

[durable_objects]
bindings = [
  { name = "ASSISTANT_THREAD_STREAM", class_name = "AssistantThreadStreamDurableObject" },
  { name = "EXECUTION_SESSION_STREAM", class_name = "ExecutionSessionStreamDurableObject" },
  { name = "COMPANY_RUNTIME_COORDINATOR", class_name = "CompanyRuntimeCoordinatorDurableObject" }
]

[[migrations]]
tag = "v1-assistant-thread-stream"
new_sqlite_classes = ["AssistantThreadStreamDurableObject"]

[[migrations]]
tag = "v2-control-plane-runtime"
new_sqlite_classes = ["ExecutionSessionStreamDurableObject", "CompanyRuntimeCoordinatorDurableObject"]

[triggers]
crons = ["*/15 * * * *"]
